<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI钓点鱼情预测</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header class="app-header">
      <h1 class="app-title">🎣 AI钓点鱼情预测</h1>
      <nav class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-page="home">分析</button>
        <button class="nav-tab" data-page="history">记录</button>
        <button class="nav-tab" data-page="settings">设置</button>
      </nav>
    </header>

    <!-- 页面容器 -->
    <main class="page-container" id="pageContainer"></main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 全屏 Loading -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loadingText">分析钓点中...</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
